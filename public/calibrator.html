<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hotspot Calibrator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: monospace; overflow: hidden; }
#container { position: relative; display: inline-block; }
#map { display: block; max-width: 100vw; max-height: 85vh; }
#svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#controls { padding: 8px 16px; background: #222; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
#controls button { padding: 4px 12px; background: #444; color: #fff; border: 1px solid #666; cursor: pointer; border-radius: 4px; }
#controls button:hover { background: #555; }
#controls button.active { background: #b8860b; color: #000; }
#coords { color: #ffd700; }
#output { position: fixed; right: 0; top: 0; width: 350px; height: 100vh; background: #1a1a1a; padding: 12px; overflow-y: auto; font-size: 11px; border-left: 1px solid #333; }
#output pre { white-space: pre-wrap; color: #0f0; }
.zone-label { fill: rgba(255,215,0,0.9); font-size: 14px; font-family: monospace; pointer-events: none; }
</style>
</head>
<body>
<div id="controls">
  <span>Zone: </span>
  <button onclick="selectZone(0)" id="btn-0">Chùa Thiền</button>
  <button onclick="selectZone(1)" id="btn-1">Hồ Tĩnh Tâm</button>
  <button onclick="selectZone(2)" id="btn-2">Gõ Mõ</button>
  <button onclick="selectZone(3)" id="btn-3">Thư Viện Vũ Trụ</button>
  <button onclick="selectZone(4)" id="btn-4">Phiên Chợ Tâm Linh</button>
  <button onclick="selectZone(5)" id="btn-5">Lễ Hội Hoa Đăng</button>
  <button onclick="selectZone(6)" id="btn-6">Hang Tiện Ích</button>
  <span> | </span>
  <button onclick="exportCoords()">📋 Export Code</button>
  <button onclick="clearZone()">🗑 Clear Zone</button>
  <span id="coords">Click: set top-left, then bottom-right</span>
</div>
<div id="container">
  <img id="map" src="/home/map-home.png" />
  <svg id="svg-overlay" viewBox="0 0 1845 1038" preserveAspectRatio="xMidYMid meet"></svg>
</div>
<div id="output"><h3 style="color:#ffd700">Coordinates Output</h3><pre id="code-output">Click zones to calibrate...</pre></div>

<script>
const NAMES = ['Chùa Thiền','Hồ Tĩnh Tâm','Gõ Mõ','Thư Viện Vũ Trụ','Phiên Chợ Tâm Linh','Lễ Hội Hoa Đăng','Hang Tiện Ích'];
const IDS = ['lauThien','hoTinhTam','goMo','thuVienVuTru','phienChoTamLinh','leHoiHoaDang','hangTienIch'];
const ROUTES = ['/thapNhang','/worry-jar','/goMo','/huyenHoc','/shop','/box','/tien-ich'];
const COLORS = ['#ff4444','#44ff44','#ffaa00','#4488ff','#ff44ff','#44ffff','#ff8844'];

let zones = Array(7).fill(null).map(() => ({ x: 0, y: 0, w: 0, h: 0, set: false }));
let activeZone = 0;
let clickState = 0; // 0 = waiting for top-left, 1 = waiting for bottom-right
let firstClick = null;

function selectZone(i) {
  activeZone = i;
  clickState = 0;
  firstClick = null;
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + i).classList.add('active');
  document.getElementById('coords').textContent = `[${NAMES[i]}] Click top-left corner`;
}

function clearZone() {
  zones[activeZone] = { x: 0, y: 0, w: 0, h: 0, set: false };
  clickState = 0;
  firstClick = null;
  render();
  document.getElementById('coords').textContent = `[${NAMES[activeZone]}] Cleared. Click top-left corner`;
}

document.getElementById('container').addEventListener('click', function(e) {
  const img = document.getElementById('map');
  const rect = img.getBoundingClientRect();
  const scaleX = 1845 / rect.width;
  const scaleY = 1038 / rect.height;
  const px = Math.round((e.clientX - rect.left) * scaleX);
  const py = Math.round((e.clientY - rect.top) * scaleY);

  if (clickState === 0) {
    firstClick = { x: px, y: py };
    clickState = 1;
    document.getElementById('coords').textContent = `[${NAMES[activeZone]}] Top-left: (${px}, ${py}). Now click bottom-right corner`;
  } else {
    const x = Math.min(firstClick.x, px);
    const y = Math.min(firstClick.y, py);
    const w = Math.abs(px - firstClick.x);
    const h = Math.abs(py - firstClick.y);
    zones[activeZone] = { x, y, w, h, set: true };
    clickState = 0;
    firstClick = null;
    document.getElementById('coords').textContent = `[${NAMES[activeZone]}] Set: x:${x} y:${y} w:${w} h:${h}`;
    // Auto-advance to next zone
    if (activeZone < 6) selectZone(activeZone + 1);
    render();
  }
});

document.getElementById('container').addEventListener('mousemove', function(e) {
  const img = document.getElementById('map');
  const rect = img.getBoundingClientRect();
  const px = Math.round((e.clientX - rect.left) * 1845 / rect.width);
  const py = Math.round((e.clientY - rect.top) * 1038 / rect.height);
  if (clickState === 1) {
    document.getElementById('coords').textContent = `[${NAMES[activeZone]}] Top-left: (${firstClick.x}, ${firstClick.y}) → Current: (${px}, ${py})`;
  }
});

function render() {
  const svg = document.getElementById('svg-overlay');
  let html = '';
  zones.forEach((z, i) => {
    if (!z.set) return;
    html += `<rect x="${z.x}" y="${z.y}" width="${z.w}" height="${z.h}" fill="${COLORS[i]}22" stroke="${COLORS[i]}" stroke-width="3" stroke-dasharray="10 5" rx="8"/>`;
    html += `<text x="${z.x + z.w/2}" y="${z.y + z.h/2 + 5}" text-anchor="middle" class="zone-label">${NAMES[i]}</text>`;
  });
  svg.innerHTML = html;
  updateOutput();
}

function updateOutput() {
  let code = 'const locations: MapLocation[] = [\n';
  zones.forEach((z, i) => {
    if (!z.set) { code += `  // ${NAMES[i]}: NOT SET\n`; return; }
    code += `  {\n    id: '${IDS[i]}',\n    name: '${NAMES[i]}',\n    route: '${ROUTES[i]}',\n    status: 'done',\n    x: ${z.x}, y: ${z.y}, w: ${z.w}, h: ${z.h},\n  },\n`;
  });
  code += ']';
  document.getElementById('code-output').textContent = code;
}

function exportCoords() {
  const code = document.getElementById('code-output').textContent;
  navigator.clipboard.writeText(code).then(() => alert('Copied to clipboard!'));
}

selectZone(0);
</script>
</body>
</html>
